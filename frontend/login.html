<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — NAS Portal</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/theme.js"></script>
</head>
<body>
  <div class="login-card">
    <h1 id="title">Login</h1>
    <p id="subtitle">Enter your password to edit the portal.</p>
    <form id="form">
      <div class="row">
        <input id="pw" type="password" placeholder="Password" autocomplete="current-password" autofocus />
      </div>
      <button class="btn primary" type="submit" style="width:100%">Continue</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
