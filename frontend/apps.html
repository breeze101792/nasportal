<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apps — NAS Portal</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/theme.js"></script>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand-wrap">
        <div class="brand" id="brand">NAS Portal</div>
        <div class="brand-sub" id="brandSub"></div>
      </div>
      <nav class="toplinks" id="toplinks"></nav>
    </header>

    <div id="banner"></div>

    <div class="panel" id="toolbarPanel">
      <div class="toolbar">
        <button class="btn primary" id="addBtn">+ Add app</button>
        <select class="sort" id="sort" aria-label="Sort">
          <option value="order">Sort: Manual</option>
          <option value="name">Sort: Name</option>
          <option value="status">Sort: Status</option>
          <option value="group">Sort: Group</option>
        </select>
        <button class="btn" id="groupedBtn">Grouped</button>
        <button class="btn" id="pingBtn">↻ Ping all</button>
      </div>

      <div class="selectbar" id="selectBar" hidden>
        <label class="sel-all"><input type="checkbox" id="selAll" /> Select all</label>
        <span class="sel-count" id="selCount">0 selected</span>
        <button class="btn" id="selGroupBtn" disabled>Set group…</button>
        <button class="btn danger" id="selDelBtn" disabled>Delete selected</button>
      </div>
    </div>

    <div class="panel" id="formPanel" hidden>
      <h2 id="formTitle">Add app</h2>
      <div class="dropzone" id="dropzone">Drag a page URL here to auto-fill, or enter it below and click Fetch.</div>
      <form id="appForm">
        <div class="grid2">
          <div class="row"><label for="f-title">Title</label><input id="f-title" name="title" required placeholder="e.g. Sonarr" /></div>
          <div class="row"><label for="f-group">Group</label><input id="f-group" name="group" placeholder="e.g. Media" /></div>
        </div>
        <div class="row">
          <label for="f-url">URLs <span class="hint-inline">— one per line, or comma-separated. IPs on the same network as you become network IPs; public hostnames become domain entries.</span></label>
          <textarea id="f-url" name="url" required rows="3" placeholder="e.g.&#10;http://10.31.1.9:8989&#10;https://sonarr.example.com"></textarea>
          <div class="hint" id="f-url-preview"></div>
        </div>
        <div class="row"><label for="f-domain">Domain <span class="hint-inline">(public hostname, optional)</span></label><input id="f-domain" name="domain" placeholder="e.g. sonarr.example.com" /></div>
        <div class="grid2">
          <div class="row"><label for="f-public-ip">Public IP <span class="hint-inline">(optional)</span></label><input id="f-public-ip" name="public_ip" placeholder="e.g. 203.0.113.10" /></div>
          <div class="row"><label for="f-port">Port <span class="hint-inline">(optional)</span></label><input id="f-port" name="port" type="number" min="1" max="65535" placeholder="e.g. 8989" /></div>
        </div>
        <div class="row"><label for="f-path">Path <span class="hint-inline">(optional, e.g. /sonarr or /dashboard)</span></label><input id="f-path" name="path" placeholder="e.g. /sonarr" /></div>
        <div class="row">
          <label>Network IPs <span class="hint-inline">— auto-filled from the URLs box, one per detected subnet. Edit as needed.</span></label>
          <div id="f-network-ips"></div>
          <button type="button" class="btn" id="addNetworkIp">+ Add network IP</button>
        </div>
        <div class="grid2">
          <div class="row"><label for="f-icon">Icon URL</label><input id="f-icon" name="icon" placeholder="e.g. https://app.local/favicon.ico" /></div>
          <div class="row"><label for="f-desc">Description</label><input id="f-desc" name="description" placeholder="e.g. Sonarr is a TV show manager" /></div>
        </div>
        <input type="hidden" id="f-id" name="id" />
        <div class="row"><button type="button" class="btn" id="scrapeBtn">↯ Fetch title/icon from URL</button></div>
        <div style="display:flex; gap:10px; margin-top:4px;">
          <button type="submit" class="btn primary">Save</button>
          <button type="button" class="btn" id="cancelBtn">Cancel</button>
        </div>
        <div class="msg" id="formMsg"></div>
      </form>
    </div>

    <div id="list" class="list-panel"></div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/apps.js"></script>
</body>
</html>
